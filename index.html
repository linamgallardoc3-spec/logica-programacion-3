<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial de un número</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Calculadora de Factorial</h1>
    </header>
    <section class="container">
        <div class="card">
            <div class="">
                <label for="numero">Ingresa un número entero</label>
                <input id="numero" type="number" name="numero" placeholder="1">
                <input id="calcular" type="button" value="Calcular">
            </div>
            <div class="footer">
                <p id="mensaje"></p>
            </div>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
